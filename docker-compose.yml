services:
  postgres:
    image: postgres:17-alpine
    container_name: musicapp-postgres
    environment:
      POSTGRES_DB: musicapp
      POSTGRES_USER: musicapp
      POSTGRES_PASSWORD: musicapp
    ports:
      - "5432:5432"
    volumes:
      - musicapp-postgres:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: musicapp-redis
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: musicapp-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  musicapp-postgres:
