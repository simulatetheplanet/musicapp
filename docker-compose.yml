services:
  postgres:
    image: postgres:17-alpine
    container_name: archiv-postgres
    environment:
      POSTGRES_DB: archiv
      POSTGRES_USER: archiv
      POSTGRES_PASSWORD: archiv
    ports:
      - "5432:5432"
    volumes:
      - archiv-postgres:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: archiv-redis
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: archiv-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  archiv-postgres:
